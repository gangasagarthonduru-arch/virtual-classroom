<!DOCTYPE html>
<html>
<head>
    <title>Login - Virtual Classroom</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#1f2937,#2563eb);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            background:white;
            padding:40px;
            border-radius:15px;
            width:320px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
            text-align:center;
        }

        .box h2{
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:10px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#1d4ed8;
        }

        a{
            display:block;
            margin-top:10px;
            color:#2563eb;
            text-decoration:none;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>🎓 Virtual Classroom Login</h2>

    <form method="POST">

        <input type="email" name="email" placeholder="Email" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>

    </form>

    <a href="/signup">Create Account</a>
</div>

</body>
</html>
