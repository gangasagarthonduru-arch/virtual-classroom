<!DOCTYPE html>
<html>
<head>
    <title>My Profile</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:#f4f6f9;
        }

        .navbar{
            background:#1f2937;
            color:white;
            padding:15px 25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-left:15px;
            font-weight:bold;
        }

        .navbar a:hover{
            color:#facc15;
        }

        .container{
            display:flex;
            justify-content:center;
            margin-top:50px;
        }

        .card{
            background:white;
            padding:30px;
            width:350px;
            border-radius:15px;
            box-shadow:0 10px 25px rgba(0,0,0,0.15);
            text-align:center;
        }

        .avatar{
            width:80px;
            height:80px;
            background:#2563eb;
            color:white;
            font-size:30px;
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
            margin:0 auto 15px;
        }

        p{
            margin:10px 0;
            font-size:16px;
        }

        .btn{
            display:inline-block;
            margin-top:15px;
            padding:10px 18px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover{
            background:#1d4ed8;
        }
    </style>
</head>

<body>

<div class="navbar">
    <h3>🎓 Virtual Classroom</h3>

    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/view_notes">Notes</a>
        <a href="/view_videos">Videos</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<div class="container">

    <div class="card">

        <div class="avatar">
            {{ user[1][0] }}
        </div>

        <h2>{{ user[1] }}</h2>

        <p><strong>Email:</strong> {{ user[2] }}</p>
        <p><strong>Role:</strong> {{ user[4] }}</p>
        <p><strong>Branch:</strong> {{ user[5] }}</p>
        <p><strong>Year:</strong> {{ user[6] }}</p>

        <a href="/dashboard" class="btn">⬅ Back to Dashboard</a>

    </div>

</div>

</body>
</html>
