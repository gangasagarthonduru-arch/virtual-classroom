<!DOCTYPE html>
<html>
<head>
    <title>Virtual Classroom Dashboard</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* NAVBAR */
        .navbar{
            background:#1f2937;
            color:white;
            padding:15px 25px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .navbar a{
            color:white;
            text-decoration:none;
            margin-left:15px;
            font-weight:bold;
        }

        .navbar a:hover{
            color:#facc15;
        }

        /* HEADER */
        .header{
            background:#2c3e50;
            color:white;
            padding:30px;
            text-align:center;
        }

        /* CONTAINER */
        .container{
            display:flex;
            flex-wrap:wrap;
            justify-content:center;
            gap:20px;
            margin-top:40px;
            padding:20px;
        }

        /* CARD */
        .card{
            background:white;
            width:250px;
            padding:20px;
            border-radius:12px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
            text-align:center;
            transition:0.3s;
        }

        .card:hover{
            transform:translateY(-8px);
        }

        .card h2{
            margin-bottom:10px;
        }

        /* BUTTON */
        .btn{
            display:inline-block;
            margin-top:15px;
            padding:10px 18px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            transition:0.3s;
        }

        .btn:hover{
            background:#1d4ed8;
            transform:scale(1.05);
        }

        /* RESPONSIVE */
        @media (max-width:768px){

            .navbar{
                flex-direction:column;
                text-align:center;
            }

            .navbar div{
                margin-top:10px;
            }

            .container{
                flex-direction:column;
                align-items:center;
            }

            .card{
                width:90%;
            }
        }

    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <h2>🎓 Virtual Classroom</h2>

    <div>
        <a href="/dashboard">Dashboard</a>
        <a href="/view_notes">Notes</a>
        <a href="/view_videos">Videos</a>
        <a href="/profile">Profile</a>
        <a href="/logout">Logout</a>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>Welcome {{ name }} 👋</h1>
    <p>Role: {{ role }}</p>
</div>

<!-- CARDS -->
<div class="container">

    <div class="card">
        <h2>📘 Notes</h2>
        <a href="/view_notes" class="btn">Open</a>
    </div>

    <div class="card">
        <h2>🎬 Videos</h2>
        <a href="/view_videos" class="btn">Watch</a>
    </div>

    {% if role == "Teacher" %}

    <div class="card">
        <h2>⬆ Upload Notes</h2>
        <a href="/upload_notes" class="btn">Upload</a>
    </div>

    <div class="card">
        <h2>🎥 Upload Videos</h2>
        <a href="/upload_video" class="btn">Upload</a>
    </div>

    {% endif %}

    <div class="card">
        <h2>👤 Profile</h2>
        <a href="/profile" class="btn">Open</a>
    </div>

</div>

</body>
</html>
